<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Times Table">
  <title>Times Table Practice</title>
  <style>
    :root {
      --ink: #18212f;
      --muted: #617087;
      --panel: rgba(255, 255, 255, 0.88);
      --line: rgba(24, 33, 47, 0.14);
      --brand: #246bfe;
      --brand-strong: #164bd8;
      --mint: #18a77a;
      --rose: #d94b64;
      --sun: #f5b642;
      --paper: #f8fbff;
      --shadow: 0 20px 60px rgba(24, 33, 47, 0.16);
      font-family: ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(24, 167, 122, 0.22), transparent 24rem),
        radial-gradient(circle at 88% 12%, rgba(245, 182, 66, 0.24), transparent 23rem),
        linear-gradient(135deg, #eaf6ff 0%, #fff7e3 48%, #f5f1ff 100%);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: max(22px, env(safe-area-inset-top)) clamp(18px, 4vw, 44px) max(22px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .app {
      width: min(920px, 100%);
      display: grid;
      gap: 18px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
    }

    .badge {
      min-width: 92px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
      border-radius: 8px;
      padding: 12px 14px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(24, 33, 47, 0.08);
    }

    .badge strong {
      display: block;
      font-size: 1.8rem;
    }

    .badge span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .stage {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    .math-strip {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 2px;
      padding: 10px;
      background: rgba(36, 107, 254, 0.08);
      border-bottom: 1px solid var(--line);
    }

    .math-strip span {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      color: rgba(24, 33, 47, 0.52);
      font-size: clamp(0.68rem, 1.7vw, 0.95rem);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.55);
    }

    .screen {
      display: none;
      padding: clamp(22px, 5vw, 42px);
    }

    .screen.active {
      display: block;
    }

    .setup-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .option {
      min-height: 94px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      font-size: clamp(1.1rem, 2.5vw, 1.55rem);
      box-shadow: 0 10px 22px rgba(24, 33, 47, 0.08);
      cursor: pointer;
      touch-action: manipulation;
    }

    .option.selected {
      border-color: var(--brand);
      background: #eaf1ff;
      color: var(--brand-strong);
      box-shadow: 0 0 0 4px rgba(36, 107, 254, 0.12);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 15px 16px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-size: 1.2rem;
      font-weight: 800;
    }

    .primary {
      width: 100%;
      min-height: 62px;
      border: 0;
      border-radius: 8px;
      margin-top: 20px;
      background: var(--brand);
      color: white;
      font: inherit;
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(36, 107, 254, 0.26);
      touch-action: manipulation;
    }

    .primary:active,
    .option:active,
    .key:active {
      transform: translateY(1px);
    }

    .progress {
      height: 12px;
      border-radius: 99px;
      overflow: hidden;
      background: rgba(24, 33, 47, 0.1);
      margin-bottom: 22px;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--mint), var(--brand));
      transition: width 260ms ease;
    }

    .question-box {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.72)),
        repeating-linear-gradient(0deg, rgba(36, 107, 254, 0.08) 0, rgba(36, 107, 254, 0.08) 1px, transparent 1px, transparent 28px),
        repeating-linear-gradient(90deg, rgba(36, 107, 254, 0.08) 0, rgba(36, 107, 254, 0.08) 1px, transparent 1px, transparent 28px);
      text-align: center;
    }

    .question-meta {
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .question {
      margin: 0;
      font-size: clamp(4rem, 14vw, 8.5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .answer-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 16px;
      align-items: stretch;
    }

    .answer-line input {
      min-height: 64px;
      font-size: clamp(1.8rem, 5vw, 3rem);
      text-align: center;
    }

    .answer-line .primary {
      width: auto;
      margin: 0;
      padding: 0 24px;
      min-width: 142px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .key {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 1.45rem;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
    }

    .key.action {
      color: var(--brand-strong);
      background: #eef4ff;
    }

    .feedback {
      min-height: 56px;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 8px;
      font-weight: 900;
      text-align: center;
    }

    .feedback.correct {
      color: #087052;
      background: rgba(24, 167, 122, 0.14);
    }

    .feedback.incorrect {
      color: #a82c43;
      background: rgba(217, 75, 100, 0.14);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 1.5rem;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .result {
      text-align: center;
    }

    .score-ring {
      width: min(260px, 70vw);
      aspect-ratio: 1;
      margin: 10px auto 22px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--mint) var(--score-angle), rgba(24, 33, 47, 0.1) 0);
      box-shadow: inset 0 0 0 18px rgba(255, 255, 255, 0.9);
    }

    .score-ring strong {
      font-size: clamp(3rem, 12vw, 5rem);
    }

    .subtle {
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 680px) {
      header {
        align-items: flex-start;
      }

      .badge {
        min-width: 78px;
      }

      .setup-grid,
      .field-row {
        grid-template-columns: 1fr;
      }

      .math-strip {
        grid-template-columns: repeat(6, 1fr);
      }

      .answer-line {
        grid-template-columns: 1fr;
      }

      .answer-line .primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="app" aria-label="Times table practice app">
      <header>
        <div class="title">
          <h1>Times Table</h1>
          <p>Quick multiplication practice up to 12 x 12.</p>
        </div>
        <div class="badge" aria-live="polite">
          <strong id="topScore">0</strong>
          <span>score</span>
        </div>
      </header>

      <div class="stage">
        <div class="math-strip" aria-hidden="true" id="mathStrip"></div>

        <section class="screen active" id="setupScreen">
          <h2>Choose a practice round</h2>
          <div class="setup-grid" role="group" aria-label="Question count">
            <button class="option selected" type="button" data-count="20">20 questions</button>
            <button class="option" type="button" data-count="50">50 questions</button>
            <button class="option" type="button" data-count="10">10 warm-up</button>
          </div>

          <div class="field-row">
            <label>
              Number of questions
              <input id="questionCount" type="number" inputmode="numeric" min="1" max="100" value="20">
            </label>
            <label>
              Highest table
              <input id="maxTable" type="number" inputmode="numeric" min="2" max="12" value="12">
            </label>
          </div>

          <button class="primary" id="startButton" type="button">Start Practice</button>
        </section>

        <section class="screen" id="quizScreen">
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

          <div class="question-box">
            <div>
              <p class="question-meta" id="questionMeta">Question 1 of 20</p>
              <p class="question" id="questionText">7 x 8</p>
            </div>
          </div>

          <form id="answerForm" class="answer-line">
            <input id="answerInput" type="number" inputmode="numeric" autocomplete="off" aria-label="Answer">
            <button class="primary" type="submit">Check</button>
          </form>

          <div class="keypad" aria-label="Number pad">
            <button class="key" type="button" data-key="1">1</button>
            <button class="key" type="button" data-key="2">2</button>
            <button class="key" type="button" data-key="3">3</button>
            <button class="key" type="button" data-key="4">4</button>
            <button class="key" type="button" data-key="5">5</button>
            <button class="key" type="button" data-key="6">6</button>
            <button class="key" type="button" data-key="7">7</button>
            <button class="key" type="button" data-key="8">8</button>
            <button class="key" type="button" data-key="9">9</button>
            <button class="key action" type="button" data-key="clear">Clear</button>
            <button class="key" type="button" data-key="0">0</button>
            <button class="key action" type="button" data-key="back">Back</button>
          </div>

          <div class="feedback" id="feedback" aria-live="polite"></div>

          <div class="stats">
            <div class="stat"><strong id="score">0</strong><span>correct</span></div>
            <div class="stat"><strong id="streak">0</strong><span>streak</span></div>
            <div class="stat"><strong id="left">20</strong><span>left</span></div>
          </div>
        </section>

        <section class="screen result" id="resultScreen">
          <div class="score-ring" id="scoreRing" style="--score-angle: 0deg">
            <strong id="percentScore">0%</strong>
          </div>
          <h2 id="resultTitle">Practice complete</h2>
          <p class="subtle" id="resultDetails">You scored 0 out of 20.</p>
          <button class="primary" id="againButton" type="button">Practice Again</button>
        </section>
      </div>
    </section>
  </main>

  <script>
    const state = {
      total: 20,
      maxTable: 12,
      index: 0,
      score: 0,
      streak: 0,
      bestStreak: 0,
      current: null,
      locked: false
    };

    const setupScreen = document.getElementById("setupScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const questionCount = document.getElementById("questionCount");
    const maxTable = document.getElementById("maxTable");
    const startButton = document.getElementById("startButton");
    const againButton = document.getElementById("againButton");
    const answerForm = document.getElementById("answerForm");
    const answerInput = document.getElementById("answerInput");
    const questionMeta = document.getElementById("questionMeta");
    const questionText = document.getElementById("questionText");
    const feedback = document.getElementById("feedback");
    const score = document.getElementById("score");
    const topScore = document.getElementById("topScore");
    const streak = document.getElementById("streak");
    const left = document.getElementById("left");
    const progressBar = document.getElementById("progressBar");
    const percentScore = document.getElementById("percentScore");
    const scoreRing = document.getElementById("scoreRing");
    const resultDetails = document.getElementById("resultDetails");
    const resultTitle = document.getElementById("resultTitle");
    const mathStrip = document.getElementById("mathStrip");

    function showScreen(screen) {
      [setupScreen, quizScreen, resultScreen].forEach((item) => item.classList.remove("active"));
      screen.classList.add("active");
    }

    function clampNumber(value, min, max, fallback) {
      const parsed = Number.parseInt(value, 10);
      if (Number.isNaN(parsed)) return fallback;
      return Math.min(max, Math.max(min, parsed));
    }

    function randomQuestion() {
      const a = 1 + Math.floor(Math.random() * state.maxTable);
      const b = 1 + Math.floor(Math.random() * state.maxTable);
      return { a, b, answer: a * b };
    }

    function updateStats() {
      score.textContent = state.score;
      topScore.textContent = state.score;
      streak.textContent = state.streak;
      left.textContent = Math.max(0, state.total - state.index);
      progressBar.style.width = `${(state.index / state.total) * 100}%`;
    }

    function nextQuestion() {
      if (state.index >= state.total) {
        finishRound();
        return;
      }

      state.current = randomQuestion();
      state.locked = false;
      questionMeta.textContent = `Question ${state.index + 1} of ${state.total}`;
      questionText.textContent = `${state.current.a} x ${state.current.b}`;
      answerInput.value = "";
      feedback.textContent = "";
      feedback.className = "feedback";
      updateStats();
      setTimeout(() => answerInput.focus(), 80);
    }

    function submitAnswer() {
      if (state.locked) return;

      const answer = Number.parseInt(answerInput.value, 10);
      if (Number.isNaN(answer)) {
        feedback.textContent = "Type a number first.";
        feedback.className = "feedback incorrect";
        return;
      }

      state.locked = true;
      const correct = answer === state.current.answer;

      if (correct) {
        state.score += 1;
        state.streak += 1;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        feedback.textContent = "Correct. Nice work.";
        feedback.className = "feedback correct";
      } else {
        state.streak = 0;
        feedback.textContent = `Not quite. ${state.current.a} x ${state.current.b} = ${state.current.answer}.`;
        feedback.className = "feedback incorrect";
      }

      state.index += 1;
      updateStats();
      setTimeout(nextQuestion, 900);
    }

    function startRound() {
      state.total = clampNumber(questionCount.value, 1, 100, 20);
      state.maxTable = clampNumber(maxTable.value, 2, 12, 12);
      questionCount.value = state.total;
      maxTable.value = state.maxTable;
      state.index = 0;
      state.score = 0;
      state.streak = 0;
      state.bestStreak = 0;
      topScore.textContent = "0";
      showScreen(quizScreen);
      nextQuestion();
    }

    function finishRound() {
      const percent = Math.round((state.score / state.total) * 100);
      percentScore.textContent = `${percent}%`;
      scoreRing.style.setProperty("--score-angle", `${percent * 3.6}deg`);
      resultDetails.textContent = `You scored ${state.score} out of ${state.total}. Best streak: ${state.bestStreak}.`;

      if (percent >= 90) {
        resultTitle.textContent = "Excellent round";
      } else if (percent >= 70) {
        resultTitle.textContent = "Strong practice";
      } else {
        resultTitle.textContent = "Good effort";
      }

      showScreen(resultScreen);
    }

    document.querySelectorAll(".option").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".option").forEach((item) => item.classList.remove("selected"));
        button.classList.add("selected");
        questionCount.value = button.dataset.count;
      });
    });

    document.querySelectorAll(".key").forEach((button) => {
      button.addEventListener("click", () => {
        const key = button.dataset.key;
        if (key === "clear") answerInput.value = "";
        else if (key === "back") answerInput.value = answerInput.value.slice(0, -1);
        else answerInput.value += key;
        answerInput.focus();
      });
    });

    answerForm.addEventListener("submit", (event) => {
      event.preventDefault();
      submitAnswer();
    });

    startButton.addEventListener("click", startRound);
    againButton.addEventListener("click", () => showScreen(setupScreen));

    for (let number = 1; number <= 12; number += 1) {
      const tile = document.createElement("span");
      tile.textContent = `${number}x`;
      mathStrip.appendChild(tile);
    }
  </script>
</body>
</html>
